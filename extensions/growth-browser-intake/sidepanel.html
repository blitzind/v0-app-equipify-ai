<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Equipify Growth Intake</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-row">
        <h1>Growth Capture</h1>
        <span id="capture-status" class="status-pill">Ready</span>
      </div>
      <p class="header-subtitle">Side panel stays open while you browse.</p>
      <div class="header-actions">
        <button type="button" id="settings-toggle-btn" class="btn-link">Settings</button>
      </div>
    </header>

    <section id="settings-panel" class="panel panel-settings">
      <div class="panel-label">Extension settings</div>
      <label>
        API environment
        <select id="api-preset-select">
          <option value="production">Production (app.equipify.ai)</option>
          <option value="local">Local dev (localhost:3000)</option>
        </select>
      </label>
      <label class="checkbox-row">
        <input id="verify-email" type="checkbox" />
        <span>Verify email before saving</span>
      </label>
      <label class="checkbox-row">
        <input id="queue-discovery" type="checkbox" />
        <span>Queue contact discovery</span>
      </label>
      <button type="button" id="save-settings-btn" class="btn-secondary">Save settings</button>
      <p id="settings-status" class="message" hidden role="status"></p>
    </section>

    <section id="recent-captures-panel" class="panel">
      <div class="panel-label">Recent captures</div>
      <div id="recent-captures-list" class="recent-list"></div>
    </section>

    <section id="detected-panel" class="panel" hidden>
      <div class="panel-label">Company detected</div>
      <div id="detected-company" class="detected-value">—</div>
      <div class="detected-meta">
        <span id="detected-platform" class="badge">website</span>
        <span id="detected-domain" class="muted"></span>
      </div>
    </section>

    <section id="existing-lead-panel" class="panel panel-warning" hidden>
      <div class="panel-label">Existing lead found</div>
      <div id="existing-lead-match-label" class="match-label"></div>
      <div id="existing-lead-summary" class="detected-value"></div>
      <div class="button-row">
        <button type="button" id="open-lead-btn" class="btn-secondary">Open Lead</button>
        <button type="button" id="update-lead-btn" class="btn-secondary">Update Existing</button>
        <button type="button" id="create-anyway-btn" class="btn-link">Create New Anyway</button>
      </div>
    </section>

    <p id="context-warning" class="message message-warning" hidden></p>

    <div class="mode-toggle">
      <button type="button" id="quick-mode-btn" class="mode-btn active">Quick Save</button>
      <button type="button" id="full-mode-btn" class="mode-btn">Full</button>
    </div>

    <form id="intake-form" class="form">
      <div id="quick-fields">
        <label>
          Contact name
          <input id="contact-name" type="text" autocomplete="name" />
        </label>
        <label>
          Email
          <input id="email" type="email" autocomplete="email" />
        </label>
        <label>
          Phone
          <input id="phone" type="tel" autocomplete="tel" />
        </label>
        <label>
          Title
          <input id="title" type="text" autocomplete="organization-title" />
        </label>
      </div>

      <div id="full-fields" hidden>
        <label>
          Company name <span class="required">*</span>
          <input id="company-name" type="text" autocomplete="organization" />
        </label>
        <label>
          Website
          <input id="website" type="url" inputmode="url" />
        </label>
        <label>
          LinkedIn URL
          <input id="linkedin-url" type="url" inputmode="url" />
        </label>
        <label>
          Notes
          <textarea id="notes" rows="2"></textarea>
        </label>
      </div>

      <input id="source-url" type="hidden" />
      <input id="source-platform-input" type="hidden" />
      <input id="page-title-input" type="hidden" />
      <input id="intake-mode-input" type="hidden" value="default" />
      <input id="target-lead-id-input" type="hidden" />

      <button id="submit-btn" type="submit">Save to Equipify</button>
    </form>

    <section id="success-panel" class="panel panel-success" hidden>
      <div class="panel-label">Saved — next steps</div>
      <div id="success-summary" class="detected-value"></div>
      <div class="success-meta">
        <div><span class="meta-key">Email:</span> <span id="success-email-status"></span></div>
        <div><span class="meta-key">Discovery:</span> <span id="success-discovery-status"></span></div>
      </div>
      <div class="button-row">
        <button type="button" id="success-open-lead-btn" class="btn-secondary">Open lead</button>
        <a id="success-captured-link" class="btn-secondary link-btn" href="#" target="_blank" rel="noopener noreferrer">
          View in Recently Captured
        </a>
        <button type="button" id="success-dismiss-btn" class="btn-link">Dismiss</button>
      </div>
    </section>

    <p id="status" class="message" hidden role="status" aria-live="polite"></p>

    <footer class="footer">
      <a id="sign-in-link" href="https://app.equipify.ai/admin/growth/browser-intake-test" target="_blank" rel="noopener noreferrer">
        Sign in to Equipify
      </a>
      <p id="extension-build-meta" class="footer-meta muted"></p>
    </footer>

    <script src="extension-config.js"></script>
    <script src="extension-storage.js"></script>
    <script src="intake-app.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>

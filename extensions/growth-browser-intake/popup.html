<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Equipify Sales</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="surface-popup es-launcher">
    <div class="es-launcher-shell">
      <header class="es-launcher-header">
        <img
          id="es-launcher-logo"
          src="assets/equipify-sales-wordmark.png"
          alt="Equipify Sales"
          class="es-launcher-logo"
          width="1024"
          height="214"
          decoding="async"
        />
        <button type="button" id="settings-toggle-btn" class="es-icon-btn" title="Settings">⚙</button>
      </header>

      <div class="es-launcher-body">
        <div id="bootstrap-loading" class="bootstrap-loading" hidden aria-live="polite">
          <span class="loading-spinner" aria-hidden="true"></span>
          <span>Checking page…</span>
        </div>
        <p id="context-warning" class="message message-warning" hidden></p>

        <section class="es-launcher-status es-card">
          <p id="linkedin-status-context" class="es-launcher-meta"></p>
          <div class="es-launcher-status-row">
            <h2 id="popup-profile-name" class="es-launcher-name">Current page</h2>
            <span id="linkedin-status-badge" class="linkedin-status-badge badge-neutral">Not In Equipify</span>
          </div>
          <p id="linkedin-status-match" class="es-launcher-match" hidden></p>
        </section>

        <button type="button" id="open-side-panel-btn" class="es-launcher-primary">Open sidebar on LinkedIn</button>
        <a id="sign-in-link" class="es-launcher-secondary link-btn" href="https://app.equipify.ai/admin/growth/leads" target="_blank" rel="noopener noreferrer">Open Equipify web app</a>

        <p id="status" class="message" hidden role="status" aria-live="polite"></p>
      </div>

      <footer class="es-launcher-footer">
        <span id="extension-build-meta" class="footer-meta">Equipify Sales</span>
        <span id="capture-status" class="status-pill status-ready">Ready</span>
      </footer>
    </div>

    <div id="settings-drawer" class="es-settings-drawer" hidden>
      <div class="es-settings-panel">
        <button type="button" id="settings-close-btn" class="btn-link es-settings-close">← Back</button>
        <section id="settings-panel" class="panel-settings">
          <div class="panel-label">Settings</div>
          <div id="extension-version-banner" class="version-banner">
            <dl class="version-grid">
              <div><dt>Installed</dt><dd id="version-installed">—</dd></div>
              <div><dt>ZIP</dt><dd id="version-packaged">—</dd></div>
              <div><dt>Latest</dt><dd id="version-latest">—</dd></div>
              <div><dt>SHA</dt><dd id="version-git-sha">—</dd></div>
              <div><dt>Built</dt><dd id="version-build-timestamp">—</dd></div>
            </dl>
            <p id="extension-version-warning" class="message message-warning" hidden role="status"></p>
          </div>
          <label style="margin-top: 12px">
            API environment
            <select id="api-preset-select">
              <option value="production">Production (app.equipify.ai)</option>
              <option value="local">Local dev (localhost:3000)</option>
            </select>
          </label>
          <label class="checkbox-row"><input id="prospecting-mode" type="checkbox" /><span>Prospecting Mode — scan badges on LinkedIn</span></label>
          <label class="checkbox-row"><input id="linkedin-floating-dock" type="checkbox" checked /><span>Show LinkedIn floating button</span></label>
          <label class="checkbox-row"><input id="verify-email" type="checkbox" /><span>Verify email before saving</span></label>
          <label class="checkbox-row"><input id="queue-discovery" type="checkbox" /><span>Queue contact discovery</span></label>
          <button type="button" id="save-settings-btn" class="btn-secondary">Save settings</button>
          <p id="settings-status" class="message" hidden role="status"></p>
        </section>
      </div>
    </div>

    <!-- Compatibility hooks for shared intake logic -->
    <div class="es-launcher-compat" hidden aria-hidden="true">
      <div id="linkedin-crm-context"></div>
      <div id="linkedin-status-panel"></div>
      <div id="detected-panel"></div>
      <div id="detected-company"></div>
      <div id="detected-platform"></div>
      <div id="detected-domain"></div>
      <div id="existing-lead-panel"></div>
      <div id="existing-lead-summary"></div>
      <div id="existing-lead-match-label"></div>
      <div id="recent-captures-list"></div>
      <form id="intake-form">
        <input id="contact-name" /><input id="email" /><input id="phone" /><input id="title" />
        <input id="company-name" /><input id="website" /><input id="linkedin-url" />
        <textarea id="notes"></textarea>
        <input id="source-url" /><input id="source-platform-input" /><input id="page-title-input" />
        <input id="intake-mode-input" value="default" /><input id="target-lead-id-input" />
        <button id="submit-btn" type="submit"></button>
      </form>
      <button id="linkedin-add-btn"></button>
      <button id="linkedin-open-lead-btn"></button>
      <button id="linkedin-update-lead-btn"></button>
      <button id="linkedin-mark-reviewed-btn"></button>
      <button id="linkedin-open-company-btn"></button>
      <button id="linkedin-open-opportunity-btn"></button>
      <button id="linkedin-add-note-btn"></button>
      <button id="open-lead-btn"></button>
      <button id="update-lead-btn"></button>
      <button id="create-anyway-btn"></button>
      <button id="quick-mode-btn"></button>
      <button id="full-mode-btn"></button>
      <div id="success-panel"></div>
      <div id="success-summary"></div>
      <div id="success-email-status"></div>
      <div id="success-discovery-status"></div>
      <button id="success-open-lead-btn"></button>
      <a id="success-captured-link"></a>
      <button id="success-dismiss-btn"></button>
    </div>

    <script src="extension-config.js"></script>
    <script src="extension-brand.js"></script>
    <script src="extension-storage.js"></script>
    <script src="extension-lookup-cache.js"></script>
    <script src="extension-contact-saved.js"></script>
    <script src="extension-version.js"></script>
    <script src="extension-ui.js"></script>
    <script src="linkedin-context.js"></script>
    <script src="linkedin-status-shared.js"></script>
    <script src="linkedin-crm-shared.js"></script>
    <script src="intake-app.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
